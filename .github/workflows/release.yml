name: release

# Publish prebuilt static binaries when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
# The one-click installer (deploy/bootstrap.sh) downloads these.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git describe --tags` sees the tag

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release tarballs (amd64 + arm64)
        run: make package

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cronova_linux_amd64.tar.gz
            dist/cronova_linux_arm64.tar.gz
            dist/SHA256SUMS
