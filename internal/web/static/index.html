<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cronova console</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="side-head">
      <div class="logo">✦</div>
      <div>
        <div class="brand">cronova</div>
        <div class="ver">scheduler v1.0</div>
      </div>
    </div>
    <div class="side-label" data-i18n="workspace">工作区</div>
    <nav class="nav">
      <div class="nav-item active" data-nav="dags" role="link" tabindex="0"><span class="ic">▦</span> DAGs <span class="count" id="nav-dags">·</span></div>
      <div class="nav-item" data-nav="graph" role="link" tabindex="0"><span class="ic">⛓</span> <span data-i18n="nav_graph">关系图</span></div>
      <div class="nav-item" data-nav="pools" role="link" tabindex="0"><span class="ic">▥</span> Pools <span class="count" id="nav-pools">·</span></div>
      <div class="nav-item" data-nav="resources" role="link" tabindex="0"><span class="ic">❖</span> <span data-i18n="nav_resources">变量 &amp; 连接</span></div>
      <div class="nav-item" data-nav="audit" role="link" tabindex="0"><span class="ic">☰</span> <span data-i18n="nav_audit">审计</span></div>
    </nav>
    <div class="side-foot">
      <div class="user-chip" id="user-chip" hidden></div>
      <div class="stat-row"><span class="dot"></span><span class="lbl">executor</span><span class="sub" id="f-exec">—</span></div>
      <div class="stat-row"><span class="dot" style="background:var(--accent);box-shadow:0 0 0 3px rgba(107,123,255,.15)"></span><span class="lbl">scheduler</span><span class="sub" id="f-tick">—</span></div>
    </div>
  </aside>
  <div class="content">
    <div class="topbar">
      <div class="crumb">cronova / <b id="crumb">DAGs</b></div>
      <div class="grow"></div>
      <div class="search"><input id="search" placeholder="筛选 DAG…" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="jump-menu" /><div class="jump-menu" id="jump-menu" role="listbox" hidden></div></div>
      <div class="tick"><span class="dot"></span><span id="tick">tick —</span><span class="tzlab" id="tzlab"></span></div>
      <button class="icon" id="theme" title="主题 / Theme" style="font-size:15px">☀</button>
      <button class="icon" id="lang" title="切换语言 / Switch language" style="font-weight:600">EN</button>
      <button class="primary" id="newdag" data-i18n="newdag">+ 新建 DAG</button>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root" class="toast-stack" aria-live="polite"></div>
<div id="login-root"></div>
<!-- classic scripts in load order share one global scope (no build step):
     base = state/i18n/helpers · views = pages · builder = schedule/templates/new-DAG · boot = wiring -->
<script src="/base.js"></script>
<script src="/views.js"></script>
<script src="/builder.js"></script>
<script src="/boot.js"></script>
</body>
</html>
